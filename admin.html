<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Admin - Input Data Kelulusan</title>
  <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* CSS Variables untuk tema */
    :root {
        --gradient-start: #020617;
        --gradient-mid: #0f172a;
        --gradient-end: #020617;
        --text-primary: #ffffff;
        --card-bg: rgba(15, 25, 45, 0.65);
        --btn-gradient-start: #0ea5e9;
        --btn-gradient-end: #3b82f6;
        --border-color: rgba(56, 189, 248, 0.3);
      }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-mid) 50%, var(--gradient-end) 100%);
      color: var(--text-primary);
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    .bg-circle {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.2;
      z-index: 0;
      pointer-events: none;
    }
    .circle1 { width: 350px; height: 350px; background: #38bdf8; top: -100px; left: -80px; }
    .circle2 { width: 500px; height: 500px; background: #a855f7; bottom: -150px; right: -100px; }
    .container {
      max-width: 800px;
      width: 100%;
      position: relative;
      z-index: 10;
    }
    .glass-card {
      backdrop-filter: blur(18px);
      background: var(--card-bg);
      border-color: var(--border-color);
      border-radius: 2rem;
      border: 1px solid rgba(56, 189, 248, 0.3);
      box-shadow: 0 25px 45px rgba(0,0,0,0.3);
      padding: 2rem 1.8rem;
      margin-bottom: 2rem;
    }
    h2, h3 {
      background: linear-gradient(135deg, #e0f2fe, #7dd3fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      margin-bottom: 0.4rem;
      color: #94a3b8;
      font-size: 0.9rem;
    }
    .input-field {
      background: rgba(255,255,255,0.07);
      border: 1px solid #334155;
      border-radius: 2rem;
      padding: 0.8rem 1.2rem;
      color: white;
      font-size: 1rem;
      outline: none;
      width: 100%;
      transition: 0.2s;
    }
    .input-field:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 12px rgba(56,189,248,0.3);
    }
    select.input-field {
      appearance: none;
      cursor: pointer;
    }
    .btn {
      border: none;
      border-radius: 3rem;
      padding: 0.8rem 1.5rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
    }
    .btn-primary {
      background: linear-gradient(100deg, var(--btn-gradient-start), var(--btn-gradient-end));
      color: white;
    }
    .btn-primary:hover {
      transform: scale(1.02);
      box-shadow: 0 0 20px #38bdf8;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #38bdf8;
      color: #38bdf8;
    }
    .btn-outline:hover {
      background: rgba(56,189,248,0.1);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }
    .flex-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      font-size: 0.9rem;
    }
    th, td {
      padding: 0.8rem;
      text-align: left;
      border-bottom: 1px solid #334155;
    }
    th {
      color: #38bdf8;
      font-weight: 600;
    }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      padding: 20px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .modal-box {
      background: #111827;
      border-radius: 1.5rem;
      padding: 2rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
      border: 1px solid #38bdf8;
    }
    .modal-box p {
      margin: 1rem 0;
      color: #cbd5e1;
      white-space: pre-line;
      text-align: left;
      line-height: 1.6;
    }
    .hidden {
      display: none;
    }
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      padding: 0.2rem 0.5rem;
      transition: 0.2s;
    }
    .icon-btn:hover {
      transform: scale(1.2);
    }
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 11000;
      flex-direction: column;
      gap: 16px;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(56,189,248,0.3);
      border-top: 3px solid #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .status-badge {
      display: inline-block;
      padding: 0.2rem 0.8rem;
      border-radius: 1rem;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .status-lulus {
      background: rgba(5, 150, 105, 0.2);
      color: #34d399;
    }
    .status-tidak {
      background: rgba(220, 38, 38, 0.2);
      color: #f87171;
    }
    @media (max-width: 600px) {
      .glass-card { padding: 1.2rem; }
      .flex-row { flex-direction: column; }
      table { font-size: 0.75rem; }
      th, td { padding: 0.5rem; }
    }
    .loading-overlay.hidden {
        display: none !important;
    }
    .spinner-small {
        width: 20px;
        height: 20px;
        border: 2px solid rgba(56,189,248,0.3);
        border-top: 2px solid #38bdf8;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        display: inline-block;
        margin-right: 8px;
        vertical-align: middle;
    }

    .progress-container {
      width: 80%;
      height: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #38bdf8, #3b82f6);
      transition: width 0.2s ease;
    }

    @keyframes fadeInOut {
      0% { opacity: 0; transform: translateY(20px); }
      15% { opacity: 1; transform: translateY(0); }
      85% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-20px); }
    }
  </style>
</head>

<script>


document.addEventListener('copy', function(e) {
    alert('Copy tidak diizinkan');
    e.preventDefault();

(function() {
        // Method 1: Deteksi resize window (DevTools dibuka)
        function detectDevTools() {
            const threshold = 160;
            const widthDiff = window.outerWidth - window.innerWidth > threshold;
            const heightDiff = window.outerHeight - window.innerHeight > threshold;
            
            if (widthDiff || heightDiff) {
                showConsoleWarning();
            }
        }
        
        
        // Method 3: Deteksi Firebug
        function detectFirebug() {
            if (window.console && (console.firebug || console.exception)) {
                showConsoleWarning();
            }
        }
        
        // Method 4: Deteksi via console.log override
        function showConsoleWarning() {
            const warningStyles = [
                'font-size: 20px',
                'font-weight: bold',
                'color: #ef4444',
                'background: #1e1e1e',
                'padding: 20px',
                'border: 2px solid #ef4444',
                'border-radius: 8px',
                'text-shadow: 0 0 5px rgba(239,68,68,0.5)'
            ].join(';');
            
            console.clear();
            console.log('%c⚠️ PERINGATAN KEAMANAN! ⚠️', warningStyles);
            console.log('%c', 'font-size: 14px; color: #fbbf24;');
            console.log('%c🚫 Developer Tools terdeteksi!', 'font-size: 16px; color: #ef4444; font-weight: bold;');
            console.log('%c', 'font-size: 14px; color: #94a3b8;');
            console.log('%c', 'font-size: 14px; color: #94a3b8;');
            console.log('%c🔒 Aplikasi ini dilindungi oleh GoAbs Security System', 'font-size: 12px; color: #667eea;');
            console.log('%c📧 Laporkan aktivitas mencurigakan ke: admin@goabs.id', 'font-size: 12px; color: #667eea;');
            console.log('%c', 'font-size: 14px; color: #94a3b8;');
        }
        
        // Method 5: Override console methods (opsional - lebih agresif)
        function protectConsole() {
            const originalConsole = {
                log: console.log,
                warn: console.warn,
                error: console.error,
                info: console.info,
                debug: console.debug,
                table: console.table,
                trace: console.trace
            };
        }
        
        // Method 6: Deteksi object console yang tidak standar
        function detectConsoleOpen() {
            const element = new Image();
            Object.defineProperty(element, 'id', {
                get: function() {
                    showConsoleWarning();
                    return '';
                }
            });
            console.log('%c', element);
        }
        
        // Method 7: Deteksi via window resize berulang
        let resizeTimer;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(function() {
                detectDevTools();
            }, 100);
        });
        
        // Method 8: Deteksi via mousemove (DevTools biasanya di kanan/bawah)
        window.addEventListener('mousemove', function(e) {
            if (e.clientX > window.innerWidth - 100 || e.clientY > window.innerHeight - 100) {
                // Mouse di area yang mencurigakan
            }
        });
        
        // Method 9: Deteksi shortcut keyboard (F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U)
        document.addEventListener('keydown', function(e) {
            // F12
            if (e.keyCode === 123) {
                e.preventDefault();
                showConsoleWarning();
                return false;
            }
            
            // Ctrl+Shift+I (Windows/Linux) atau Cmd+Option+I (Mac)
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) {
                e.preventDefault();
                showConsoleWarning();
                return false;
            }
            
            // Ctrl+U (View Source)
            if ((e.ctrlKey || e.metaKey) && e.keyCode === 85) {
                e.preventDefault();
                showConsoleWarning();
                return false;
            }
            
            // Ctrl+Shift+C (Inspect Element)
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.keyCode === 67) {
                e.preventDefault();
                showConsoleWarning();
                return false;
            }
        });
        
        // Blokir klik kanan
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
        
        // Jalankan deteksi secara periodik
        setInterval(function() {
            detectDevTools();
        }, 1000);
        
        // Jalankan saat halaman load
        window.addEventListener('load', function() {
            detectDevTools();
            protectConsole();
            
            // Tampilkan pesan normal di console (untuk developer yang sah)
            console.log('%c✅ GoAbs - Sistem Absensi Digital', 'font-size: 16px; color: #667eea; font-weight: bold;');
            console.log('%c🚀 Aplikasi berjalan normal', 'font-size: 14px; color: #22c55e;');
        });
        
        // Cegah select text
        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
        });
        
        // Deteksi jika user mencoba inspect element via context menu
        window.addEventListener('beforeunload', function() {
            // Cleanup
        });
        
    })();

    // ====== HARD BLOCK DEVTOOLS ======
    function blockUserAccess() {
        if (document.getElementById('blocked')) return;

        const div = document.createElement('div');
        div.id = 'blocked';
        div.style.cssText = `
            position:fixed;
            inset:0;
            background:#020617;
            color:#ef4444;
            display:flex;
            align-items:center;
            justify-content:center;
            z-index:999999;
        `;
        div.innerHTML = '⚠️ Developer Tools terdeteksi';

        document.body.appendChild(div);
    }

// Deteksi DevTools lebih sensitif
function isDevToolsOpen() {
    const threshold = 150;
    return (
        window.outerWidth - window.innerWidth > threshold ||
        window.outerHeight - window.innerHeight > threshold
    );
}

// Loop monitoring
setInterval(() => {
    if (isDevToolsOpen()) {
        blockUserAccess();
    }
}, 800);


// Proteksi tambahan: blur jika tab tidak aktif (indikasi inspect)
document.addEventListener("visibilitychange", function () {
    if (document.hidden) {
        document.body.style.filter = "blur(8px)";
    } else {
        document.body.style.filter = "none";
    }
});


  // ============ KONFIGURASI ============
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwWAsabHqWTtxym8KC89PlLIzba0epq6JRB3TrxKGgH2lb62khAs_DsHYFAlxZ5kXMA/exec';

  // ============ STATE ============
  let dataPeserta = [];
  let sudahUnduhFormat = false;

  // ============ CACHE SYSTEM ============
  const CACHE_KEY = 'cachedDataSiswa';
  const CACHE_TIMESTAMP_KEY = 'cacheTimestamp';
  const CACHE_DURATION = 5 * 60 * 1000; // 5 menit

  function loadFromCache() {
    const cached = localStorage.getItem(CACHE_KEY);
    const timestamp = localStorage.getItem(CACHE_TIMESTAMP_KEY);
    
    if (cached && timestamp && (Date.now() - timestamp) < CACHE_DURATION) {
      try {
        const cachedData = JSON.parse(cached);
        if (cachedData && cachedData.length > 0) {
          dataPeserta = cachedData;
          renderTabel();
          return true;
        }
      } catch(e) { console.error('Cache error:', e); }
    }
    return false;
  }

  function saveToCache() {
    localStorage.setItem(CACHE_KEY, JSON.stringify(dataPeserta));
    localStorage.setItem(CACHE_TIMESTAMP_KEY, Date.now());
  }

  function clearCache() {
    localStorage.removeItem(CACHE_KEY);
    localStorage.removeItem(CACHE_TIMESTAMP_KEY);
  }

  // ============ UTILITY FUNCTIONS ============
  function tampilkanLoading() {
      // Hapus dulu semua loading overlay yang mungkin tersisa
      document.querySelectorAll('.loading-overlay').forEach(el => {
        el.classList.add('hidden');
      });      
      // Baru tampilkan yang asli
      const loadingEl = document.getElementById('loadingOverlay');
      if (loadingEl) {
          loadingEl.classList.remove('hidden');
      }
  }

  function sembunyikanLoading() {
      // Sembunyikan SEMUA loading overlay
      document.querySelectorAll('.loading-overlay').forEach(el => {
          el.classList.add('hidden');
      });
  }

  function tampilkanModal(title, text) {
    document.getElementById('modalTitle').innerText = title;
    document.getElementById('modalText').innerText = text;
    document.getElementById('modalPesan').classList.remove('hidden');
  }

  function tampilkanStatus(elementId, text, isError = false) {
    const el = document.getElementById(elementId);
    el.style.color = isError ? '#f87171' : '#34d399';
    el.innerText = text;
    setTimeout(() => {
      el.innerText = '';
    }, 5000);
  }

  document.getElementById('btnTutupModal').addEventListener('click', () => {
    document.getElementById('modalPesan').classList.add('hidden');
  });

  // Tutup modal dengan klik di luar
  document.getElementById('modalPesan').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modalPesan')) {
      document.getElementById('modalPesan').classList.add('hidden');
    }
  });

  // ============ LOAD DATA SEKOLAH SAAT HALAMAN DIBUKA ============
  async function loadDataSekolah() {
    try {
      const response = await fetch(`${APPS_SCRIPT_URL}?action=getSekolah`);
      const data = await response.json();
      if (data.success) {
        document.getElementById('namaSekolah').value = data.namaSekolah || '';
        document.getElementById('namaKepsek').value = data.namaKepsek || '';
      }
    } catch (err) {
      console.error('Gagal load data sekolah:', err);
      // Fallback: tetap isi dengan default, jangan stuck
      document.getElementById('namaSekolah').value = 'Nama Sekolah';

  document.getElementById('fileExcelInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = async (event) => {
      try {
        const data = new Uint8Array(event.target.result);
        const workbook = XLSX.read(data, { type: 'array', cellDates: true });
        const sheetName = workbook.SheetNames[0];
        const sheet = workbook.Sheets[sheetName];
        const jsonData = XLSX.utils.sheet_to_json(sheet, {
          header: 1,
          raw: false
        });
        
        if (jsonData.length < 2) {
          tampilkanModal("❌ Error", "File kosong atau tidak memiliki data.");
          return;
        }
        
        tampilkanLoading();
        
        const el = document.getElementById('progressContainer');
        if (el) el.classList.remove('hidden');
        updateLoadingText("Memulai proses upload...");

        let countSuccess = 0;
        let countFailed = 0;
        const newData = [];

        const batchSize = 10;

        for (let i = 1; i < jsonData.length; i += batchSize) {

          const batch = jsonData.slice(i, i + batchSize);

          updateLoadingText(`Mengirim batch ${Math.ceil(i / batchSize)}...`);

          // kirim paralel (INI YANG BIKIN 10x LEBIH CEPAT)
          const promises = batch.map(async (row, j) => {

            const rowIndex = i + j;
            updateProgress(rowIndex, jsonData.length - 1);

            if (row && row.length >= 4 && row[0] && row[1]) {

              const peserta = {
                nama: String(row[0]).trim(),
                nisn: String(row[1]).trim(),
                tempatLahir: String(row[2] || '').trim(),
                tanggalLahir: normalizeTanggal(row[3]),
                status: String(row[4] || '').trim()
              };

              const success = await kirimDataSiswa(peserta);

              return { success, peserta };
            }

            return { success: false };
          });

          const results = await Promise.all(promises);

          results.forEach(r => {
            if (r.success) {
              newData.push(r.peserta);
              countSuccess++;
            } else {
              countFailed++;
            }
          });

          // anti freeze UI
          await new Promise(r => setTimeout(r, 50));
        }
        
        dataPeserta.push(...newData);
        renderTabel();

        sembunyikanLoading();
        document.getElementById('progressContainer').classList.add('hidden');

        let msg = `${countSuccess} data berhasil dikirim ke Spreadsheet.`;

        if (countFailed > 0) {
          msg += `\n${countFailed} data gagal (mungkin NISN duplikat).`;
        }

        tampilkanStatus('statusUpload', msg, countFailed > 0);
        
      } catch (err) {
        sembunyikanLoading();
        tampilkanModal("❌ Error", "Gagal membaca file. Pastikan format sesuai.");
        console.error(err);
      }
    };
    reader.readAsArrayBuffer(file);

  });

  const BATCH_SIZE = 10;

  async function kirimBatchSiswa(listPeserta, onProgress) {
    let success = 0;
    let failed = 0;

    for (let i = 0; i < listPeserta.length; i += BATCH_SIZE) {
      const batch = listPeserta.slice(i, i + BATCH_SIZE);

      // kirim paralel dalam 1 batch
      const promises = batch.map(p => kirimDataSiswa(p));

      const results = await Promise.all(promises);

      results.forEach(r => {
        if (r) success++;
        else failed++;
      });

      // progress update
      if (onProgress) {
        onProgress(Math.min(i + BATCH_SIZE, listPeserta.length), listPeserta.length);
      }

      // kasih napas ke UI (ANTI FREEZE)
      await new Promise(r => setTimeout(r, 50));
    }

    return { success, failed };
  }

  function formatTanggal(dateString) {
    if (!dateString) return '-';

    const date = new Date(dateString);
    if (isNaN(date)) return dateString; // kalau bukan format date, biarkan

    const hari = String(date.getDate()).padStart(2, '0');
    const bulan = String(date.getMonth() + 1).padStart(2, '0');
    const tahun = date.getFullYear();

    return `${hari}/${bulan}/${tahun}`;
  }

  function normalizeTanggal(value) {
    if (!value) return '';

    // kalau sudah Date object
    if (value instanceof Date) {
      const d = String(value.getDate()).padStart(2, '0');
      const m = String(value.getMonth() + 1).padStart(2, '0');
      const y = value.getFullYear();
      return `${d}/${m}/${y}`;
    }

    // kalau string Excel / CSV
    if (typeof value === 'string') {
      // kalau sudah format DD/MM/YYYY biarkan
      if (/^\d{2}\/\d{2}\/\d{4}$/.test(value)) return value;

      // coba parse fallback
      const date = new Date(value);
      if (!isNaN(date)) {
        const d = String(date.getDate()).padStart(2, '0');
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const y = date.getFullYear();
        return `${d}/${m}/${y}`;
      }
    }

    return value;
  }

function applyTheme(backgroundColor, textColor) {
  const root = document.documentElement;
  const tema = temaGradasi[backgroundColor] || temaGradasi.default;
  
  root.style.setProperty('--gradient-start', tema.gradientStart);
  root.style.setProperty('--gradient-mid', tema.gradientMid);
  root.style.setProperty('--gradient-end', tema.gradientEnd);
  root.style.setProperty('--btn-gradient-start', tema.btnStart);
  root.style.setProperty('--btn-gradient-end', tema.btnEnd);
  root.style.setProperty('--border-color', tema.borderColor);
  root.style.setProperty('--card-bg', tema.cardBg);
  
  // Gunakan warna teks dari parameter jika ada, atau tema default
  if (textColor) {
    root.style.setProperty('--text-primary', textColor);
  } else if (backgroundColor === 'putih') {
    root.style.setProperty('--text-primary', '#1e293b');
  } else {
    root.style.setProperty('--text-primary', '#ffffff');
  }
}

      // Set dropdown
      document.getElementById('temaBackground').value = data.temaBackground || 'default';
      document.getElementById('warnaTeks').value = data.warnaTeks || '#ffffff';
      document.getElementById('warnaTeksHex').value = data.warnaTeks || '#ffffff';
      
      // Apply theme
      applyTheme(data.temaBackground || 'default', data.warnaTeks);
      return true;
    }
  } catch (err) {
    console.error('Gagal load tema:', err);
  }
  
  // Default fallback
  document.getElementById('temaBackground').value = 'default';
  document.getElementById('warnaTeks').value = '#ffffff';
  document.getElementById('warnaTeksHex').value = '#ffffff';
  applyTheme('default', '#ffffff');
  return false;
}

async function simpanTema() {
  const temaBackground = document.getElementById('temaBackground').value;
  let warnaTeks = document.getElementById('warnaTeksHex').value;
  
  // Validasi warna hex
  if (!warnaTeks.match(/^#[0-9A-Fa-f]{6}$/)) {
    tampilkanStatus('statusTema', '❌ Format warna tidak valid! Gunakan format HEX (contoh: #FFFFFF)', true);
    return;
  }
  
  tampilkanLoading();
  try {
    const params = new URLSearchParams({
      action: 'updateTema',
      temaBackground: temaBackground,
      warnaTeks: warnaTeks
    });
    
    const response = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: params
    });
    const result = await response.json();
    
    if (result.success) {
      // Apply theme langsung
      applyTheme(temaBackground, warnaTeks);
      tampilkanStatus('statusTema', '✅ Tema berhasil disimpan!');
    } else {
      tampilkanStatus('statusTema', '❌ Gagal: ' + (result.error || 'Error tidak diketahui'), true);
    }
  } catch (err) {
    console.error('Error:', err);
    tampilkanStatus('statusTema', '❌ Gagal menyimpan tema', true);
  } finally {
    sembunyikanLoading();
  }
}

async function resetTema() {
  tampilkanLoading();
  try {
    const params = new URLSearchParams({
      action: 'resetTema'
    });
    
    const response = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: params
    });
    const result = await response.json();
    
    if (result.success) {
      document.getElementById('temaBackground').value = 'default';
      document.getElementById('warnaTeks').value = '#ffffff';
      document.getElementById('warnaTeksHex').value = '#ffffff';
      applyTheme('default', '#ffffff');
      tampilkanStatus('statusTema', '✅ Tema berhasil direset ke default!');
    } else {
      tampilkanStatus('statusTema', '❌ Gagal reset tema', true);
    }
  } catch (err) {
    console.error('Error:', err);
    tampilkanStatus('statusTema', '❌ Gagal reset tema', true);
  } finally {
    sembunyikanLoading();
  }
}

// Sinkronisasi input color dan text
document.getElementById('warnaTeks').addEventListener('input', (e) => {
  document.getElementById('warnaTeksHex').value = e.target.value;
});

document.getElementById('warnaTeksHex').addEventListener('input', (e) => {
  let val = e.target.value;
  if (!val.startsWith('#')) val = '#' + val;
  if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
    document.getElementById('warnaTeks').value = val;
  }
});

// Event listeners untuk tema
document.getElementById('btnSimpanTema').addEventListener('click', simpanTema);
document.getElementById('btnResetTema').addEventListener('click', resetTema);


</script>
</body>
</html>

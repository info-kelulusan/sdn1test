<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title id="pageTitle">Info Kelulusan</title>
<link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">

<style>
/* ================= RESET & GLOBAL ================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
}

:root {
    --gradient-start: #020617;
    --gradient-mid: #0f172a;
    --gradient-end: #020617;
    --text-primary: #ffffff;
    --card-bg: rgba(15, 25, 45, 0.65);
    --btn-gradient-start: #0ea5e9;
    --btn-gradient-end: #3b82f6;
    --border-color: rgba(56, 189, 248, 0.3);
    --welcome-bg-start: #0f172a;
    --welcome-bg-end: #020617;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-mid) 50%, var(--gradient-end) 100%);
    color: var(--text-primary);
    overflow-x: hidden;
    position: relative;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Blur background orbs */
.bg-circle {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.2;
    z-index: 0;
    pointer-events: none;
}
.circle1 {
    width: 350px;
    height: 350px;
    background: #38bdf8;
    top: -100px;
    left: -80px;
}
.circle2 {
    width: 500px;
    height: 500px;
    background: #a855f7;
    bottom: -150px;
    right: -100px;
}
.circle3 {
    width: 400px;
    height: 400px;
    background: #0ea5e9;
    top: 40%;
    left: 60%;
}

/* ================= WELCOME SCREEN ================= */
#welcomeScreen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at center, var(--welcome-bg-start), var(--welcome-bg-end));
    z-index: 10000;
    backdrop-filter: blur(4px);
    transition: background 0.3s ease;
}
.welcome-wrapper {
    padding: 0 24px;
    text-align: center;
    width: 100%;
    display: flex;
    justify-content: center;
}

/* update welcome-text */
.welcome-text {
    font-family: 'Goldman', system-ui, sans-serif;
    font-size: 48px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    line-height: 1;
    text-align: center;
    max-width: 100%;
    padding: 0 16px;
    background: linear-gradient(180deg, #e0f2fe, #38bdf8);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    opacity: 0;
    transform: scale(0.85) translateY(10px);
    transition: opacity 0.5s ease, transform 0.5s ease;
}

/* Class untuk animasi masuk */
.welcome-text.animate-in {
    opacity: 1;
    transform: scale(1);
    animation: glowCinematic 2.2s ease-in-out infinite alternate;
}

/* Class untuk animasi keluar */
.welcome-text.animate-out {
    animation: fadeOutText 0.9s forwards !important;
}

@keyframes fadeOutText {
    0% {
        opacity: 1;
        transform: scale(1);
    }
    100% {
        opacity: 0;
        transform: scale(1.2);
    }
}

/* cinematic glow lebih halus */
@keyframes glowCinematic {
    from {
        text-shadow: 0 0 8px rgba(56,189,248,0.25);
        filter: brightness(1);
    }
    to {
        text-shadow: 0 0 22px rgba(56,189,248,0.55), 0 0 40px rgba(14,165,233,0.35);
        filter: brightness(1.15);
    }
}

/* Animasi fade out untuk welcome screen */
.welcome-screen-fade-out {
    animation: fadeOutScreen 0.9s forwards;
}

@keyframes fadeOutScreen {
    to {
        opacity: 0;
        visibility: hidden;
    }
}

/* ================= MAIN CONTENT ================= */
#mainContent {
    opacity: 0;
    transition: opacity 0.9s ease;
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 550px;
    margin: 0 auto;
}
#mainContent.show {
    opacity: 1;
}
.hidden {
    display: none;
}

/* ================= GLASS CARD ================= */
.glass-card {
    backdrop-filter: blur(18px);
    background: var(--card-bg);
    border-radius: 2.5rem;
    border: 1px solid var(--border-color);
    box-shadow: 0 25px 45px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.08);
    padding: 2rem 1.8rem;
    transition: all 0.2s;
}

.main-container {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

.search-area {
    text-align: center;
}
.search-area h2 {
    font-size: 1.9rem;
    font-weight: 700;
    background: linear-gradient(135deg, #e0f2fe, #7dd3fc);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 0.5rem;
}
.subtitle {
    color: #94a3b8;
    margin-bottom: 2rem;
    font-size: 0.9rem;
}
.input-group {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}
.input-field {
    background: rgba(255,255,255,0.07);
    border: 1px solid #334155;
    border-radius: 2rem;
    padding: 1rem 1.5rem;
    color: var(--text-primary);
    font-size: 1rem;
    outline: none;
    transition: 0.2s;
}
.input-field:focus {
    border-color: #38bdf8;
    box-shadow: 0 0 12px rgba(56,189,248,0.4);
    background: rgba(255,255,255,0.12);
}
  
.subtitle, .ketua {
    color: var(--text-primary);
}
  
.data-nama, .data-nisn, .data-ttl {
    color: var(--text-primary);
}

.btn-primary {
    background: linear-gradient(100deg, var(--btn-gradient-start), var(--btn-gradient-end));
    border: none;
    border-radius: 3rem;
    padding: 1rem;
    font-weight: bold;
    font-size: 1.1rem;
    cursor: pointer;
    color: white;
    transition: 0.2s;
    margin-top: 0.5rem;
    box-shadow: 0 5px 12px rgba(14,165,233,0.3);
}
.btn-primary:hover {
    transform: scale(1.02);
    box-shadow: 0 0 20px #38bdf8;
}

/* ================= LOADING OVERLAY ================= */
.loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(8px);
    z-index: 30000;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    animation: fadeInModal 0.3s ease;
}
.loading-spinner-large {
    width: 60px;
    height: 60px;
    border: 4px solid rgba(56, 189, 248, 0.2);
    border-top: 4px solid #38bdf8;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
.loading-text {
    color: #38bdf8;
    font-size: 1.2rem;
    font-weight: 500;
    letter-spacing: 1px;
}
@keyframes spin {
    to { transform: rotate(360deg); }
}
@keyframes fadeInModal {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* ================= MODAL ================= */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20000;
    padding: 20px;
    animation: fadeModal 0.3s ease;
}
@keyframes fadeModal {
    from { opacity: 0; }
    to { opacity: 1; }
}
.success-card {
    max-width: 500px;
    width: 100%;
    background: linear-gradient(145deg, #0f172a, #030617);
    border-radius: 2rem;
    border: 1px solid rgba(56,189,248,0.6);
    padding: 2rem 1.8rem;
    box-shadow: 0 30px 50px rgba(0,0,0,0.5);
    text-align: center;
    animation: slideUp 0.4s;
}
@keyframes slideUp {
    from { transform: translateY(50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}
.lulus-badge {
    font-size: 2.5rem;
    font-weight: 800;
    color: #facc15;
    text-shadow: 0 0 6px #fbbf24;
    letter-spacing: 2px;
    margin-bottom: 1rem;
}

.data-center {
    margin: 1.5rem 0;
    text-align: center;
}
.data-nama {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    word-break: break-word;
}
.data-nisn {
    font-size: 1.1rem;
    margin-bottom: 0.5rem;
    letter-spacing: 1px;
}
.data-ttl {
    font-size: 0.95rem;
    margin-top: 0.3rem;
}

.ketua {
    margin-top: 1.5rem;
    border-top: 1px dashed #334155;
    padding-top: 1rem;
    font-style: italic;
    font-size: 0.85rem;
}

.btn-close-full {
    background: #475569;
    border: none;
    border-radius: 3rem;
    padding: 0.9rem 1rem;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    color: white;
    transition: 0.2s;
    width: 100%;
    margin-top: 1rem;
}
.btn-close-full:hover {
    background: #334155;
    transform: scale(1.01);
}

@media (max-width: 550px) {
    .welcome-text { font-size: 42px; letter-spacing: 4px; }
    .glass-card { 
        background: var(--card-bg);
        border-color: var(--border-color);
        padding: 1.5rem; 
    }
    .data-nama { font-size: 1.5rem; }
    .data-nisn { font-size: 1rem; }
}
</style>
</head>
<body>

<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>
<div class="bg-circle circle3"></div>

<div id="welcomeScreen">
    <div class="welcome-wrapper">
        <h1 class="welcome-text" id="welcomeText"></h1>
    </div>
</div>

<div id="mainContent" class="hidden">
    <div class="main-container">
        <div class="glass-card">
            <div class="search-area">
                <h2 id="judulPengumuman">PENGUMUMAN KELULUSAN</h2>
                <div class="subtitle" id="subtitleSekolah"></div>
                <div class="input-group">
                    <input type="text" id="nisnInput" class="input-field" placeholder="Masukkan NISN Anda..." autocomplete="off">
                    <button id="searchBtn" class="btn-primary">🔍 Cari NISN & Lihat Hasil</button>
                </div>
                <div id="infoMessage" style="margin-top: 20px; font-size: 0.85rem; color: #f97316; min-height: 45px;"></div>
            </div>
        </div>
    </div>
</div>

<script>


document.addEventListener('copy', function(e) {
    alert('Copy tidak diizinkan');
    e.preventDefault();
});


(function() {
        // Method 1: Deteksi resize window (DevTools dibuka)
        function detectDevTools() {
            const threshold = 160;
            const widthDiff = window.outerWidth - window.innerWidth > threshold;
            const heightDiff = window.outerHeight - window.innerHeight > threshold;
            
            if (widthDiff || heightDiff) {
                showConsoleWarning();
            }
        }
        
        
        // Method 3: Deteksi Firebug
        function detectFirebug() {
            if (window.console && (console.firebug || console.exception)) {
                showConsoleWarning();
            }
        }
        
        // Method 4: Deteksi via console.log override
        function showConsoleWarning() {
            const warningStyles = [
                'font-size: 20px',
                'font-weight: bold',
                'color: #ef4444',
                'background: #1e1e1e',
                'padding: 20px',
                'border: 2px solid #ef4444',
                'border-radius: 8px',
                'text-shadow: 0 0 5px rgba(239,68,68,0.5)'
            ].join(';');
            
            console.clear();
            console.log('%c⚠️ PERINGATAN KEAMANAN! ⚠️', warningStyles);
            console.log('%c', 'font-size: 14px; color: #fbbf24;');
            console.log('%c🚫 Developer Tools terdeteksi!', 'font-size: 16px; color: #ef4444; font-weight: bold;');
            console.log('%c', 'font-size: 14px; color: #94a3b8;');
            console.log('%c', 'font-size: 14px; color: #94a3b8;');
            console.log('%c🔒 Aplikasi ini dilindungi oleh GoAbs Security System', 'font-size: 12px; color: #667eea;');
            console.log('%c📧 Laporkan aktivitas mencurigakan ke: admin@goabs.id', 'font-size: 12px; color: #667eea;');
            console.log('%c', 'font-size: 14px; color: #94a3b8;');
        }
        
        // Method 5: Override console methods (opsional - lebih agresif)
        function protectConsole() {
            const originalConsole = {
                log: console.log,
                warn: console.warn,
                error: console.error,
                info: console.info,
                debug: console.debug,
                table: console.table,
                trace: console.trace
            };
        }
        
        // Method 6: Deteksi object console yang tidak standar
        function detectConsoleOpen() {
            const element = new Image();
            Object.defineProperty(element, 'id', {
                get: function() {
                    showConsoleWarning();
                    return '';
                }
            });
            console.log('%c', element);
        }
        
        // Method 7: Deteksi via window resize berulang
        let resizeTimer;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(function() {
                detectDevTools();
            }, 100);
        });
        
        // Method 8: Deteksi via mousemove (DevTools biasanya di kanan/bawah)
        window.addEventListener('mousemove', function(e) {
            if (e.clientX > window.innerWidth - 100 || e.clientY > window.innerHeight - 100) {
                // Mouse di area yang mencurigakan
            }
        });
        
        // Method 9: Deteksi shortcut keyboard (F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U)
        document.addEventListener('keydown', function(e) {
            // F12
            if (e.keyCode === 123) {
                e.preventDefault();
                showConsoleWarning();
                return false;
            }
            
            // Ctrl+Shift+I (Windows/Linux) atau Cmd+Option+I (Mac)
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) {
                e.preventDefault();
                showConsoleWarning();
                return false;
            }
            
            // Ctrl+U (View Source)
            if ((e.ctrlKey || e.metaKey) && e.keyCode === 85) {
                e.preventDefault();
                showConsoleWarning();
                return false;
            }
            
            // Ctrl+Shift+C (Inspect Element)
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.keyCode === 67) {
                e.preventDefault();
                showConsoleWarning();
                return false;
            }
        });
        
        // Blokir klik kanan
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
        
        // Jalankan deteksi secara periodik
        setInterval(function() {
            detectDevTools();
        }, 1000);
        
        // Jalankan saat halaman load
        window.addEventListener('load', function() {
            detectDevTools();
            protectConsole();
            
            // Tampilkan pesan normal di console (untuk developer yang sah)
            console.log('%c✅ GoAbs - Sistem Absensi Digital', 'font-size: 16px; color: #667eea; font-weight: bold;');
            console.log('%c🚀 Aplikasi berjalan normal', 'font-size: 14px; color: #22c55e;');
        });
        
        // Cegah select text
        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
        });
        
        // Deteksi jika user mencoba inspect element via context menu
        window.addEventListener('beforeunload', function() {
            // Cleanup
        });
        
    })();

    // ====== HARD BLOCK DEVTOOLS ======
    function blockUserAccess() {
        if (document.getElementById('blocked')) return;

        const div = document.createElement('div');
        div.id = 'blocked';
        div.style.cssText = `
            position:fixed;
            inset:0;
            background:#020617;
            color:#ef4444;
            display:flex;
            align-items:center;
            justify-content:center;
            z-index:999999;
        `;
        div.innerHTML = '⚠️ Developer Tools terdeteksi';

        document.body.appendChild(div);
    }

// Deteksi DevTools lebih sensitif
function isDevToolsOpen() {
    const threshold = 150;
    return (
        window.outerWidth - window.innerWidth > threshold ||
        window.outerHeight - window.innerHeight > threshold
    );
}

// Loop monitoring
setInterval(() => {
    if (isDevToolsOpen()) {
        blockUserAccess();
    }
}, 800);


// Proteksi tambahan: blur jika tab tidak aktif (indikasi inspect)
document.addEventListener("visibilitychange", function () {
    if (document.hidden) {
        document.body.style.filter = "blur(8px)";
    } else {
        document.body.style.filter = "none";
    }
});



// ========== KONFIGURASI ==========
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwWAsabHqWTtxym8KC89PlLIzba0epq6JRB3TrxKGgH2lb62khAs_DsHYFAlxZ5kXMA/exec';

let currentStudentData = null;
let sekolahData = {
    namaSekolah: '',
    namaKepsek: ''
};

// ============ FUNGSI TEMA ============
function applyThemeFromSheet(backgroundColor, textColor) {
  const root = document.documentElement;
  
  const temaGradasi = {
    default: {
      gradientStart: '#020617',
      gradientMid: '#0f172a',
      gradientEnd: '#020617',
      btnStart: '#0ea5e9',
      btnEnd: '#3b82f6',
      borderColor: 'rgba(56, 189, 248, 0.3)',
      cardBg: 'rgba(15, 25, 45, 0.65)',
      welcomeStart: '#0f172a',
      welcomeEnd: '#020617'
    },
    pink: {
      gradientStart: '#4c0519',
      gradientMid: '#9d174d',
      gradientEnd: '#4c0519',
      btnStart: '#ec4899',
      btnEnd: '#db2777',
      borderColor: 'rgba(236, 72, 153, 0.3)',
      cardBg: 'rgba(30, 10, 30, 0.65)',
      welcomeStart: '#4c0519',
      welcomeEnd: '#2e0037'
    },
    tosca: {
      gradientStart: '#042f2e',
      gradientMid: '#0d9488',
      gradientEnd: '#042f2e',
      btnStart: '#14b8a6',
      btnEnd: '#0d9488',
      borderColor: 'rgba(20, 184, 166, 0.3)',
      cardBg: 'rgba(10, 40, 40, 0.65)',
      welcomeStart: '#042f2e',
      welcomeEnd: '#021c1c'
    },
    ungu: {
      gradientStart: '#2e1065',
      gradientMid: '#7c3aed',
      gradientEnd: '#2e1065',
      btnStart: '#8b5cf6',
      btnEnd: '#6d28d9',
      borderColor: 'rgba(139, 92, 246, 0.3)',
      cardBg: 'rgba(30, 15, 50, 0.65)',
      welcomeStart: '#2e1065',
      welcomeEnd: '#1a0540'
    },
    hijau: {
      gradientStart: '#052e16',
      gradientMid: '#16a34a',
      gradientEnd: '#052e16',
      btnStart: '#22c55e',
      btnEnd: '#15803d',
      borderColor: 'rgba(34, 197, 94, 0.3)',
      cardBg: 'rgba(15, 40, 20, 0.65)',
      welcomeStart: '#052e16',
      welcomeEnd: '#021a0c'
    },
    putih: {
      gradientStart: '#e2e8f0',
      gradientMid: '#cbd5e1',
      gradientEnd: '#e2e8f0',
      btnStart: '#64748b',
      btnEnd: '#475569',
      borderColor: 'rgba(100, 116, 139, 0.4)',
      cardBg: 'rgba(255, 255, 255, 0.2)',
      welcomeStart: '#cbd5e1',
      welcomeEnd: '#94a3b8'
    }
  };
  
  const tema = temaGradasi[backgroundColor] || temaGradasi.default;
  
  root.style.setProperty('--gradient-start', tema.gradientStart);
  root.style.setProperty('--gradient-mid', tema.gradientMid);
  root.style.setProperty('--gradient-end', tema.gradientEnd);
  root.style.setProperty('--btn-gradient-start', tema.btnStart);
  root.style.setProperty('--btn-gradient-end', tema.btnEnd);
  root.style.setProperty('--border-color', tema.borderColor);
  root.style.setProperty('--card-bg', tema.cardBg);
  root.style.setProperty('--welcome-bg-start', tema.welcomeStart);
  root.style.setProperty('--welcome-bg-end', tema.welcomeEnd);
  
  if (textColor && textColor !== '#undefined' && textColor !== 'null') {
    root.style.setProperty('--text-primary', textColor);
  } else if (backgroundColor === 'putih') {
    root.style.setProperty('--text-primary', '#1e293b');
  } else {
    root.style.setProperty('--text-primary', '#ffffff');
  }
}

async function loadTemaFromSheet() {
  try {
    const response = await fetch(`${APPS_SCRIPT_URL}?action=getTema&_=${Date.now()}`);
    const data = await response.json();
    
    if (data.success) {
      console.log('Tema loaded:', data.temaBackground, data.warnaTeks);
      applyThemeFromSheet(data.temaBackground || 'default', data.warnaTeks);
      return true;
    } else {
      applyThemeFromSheet('default', '#ffffff');
      return false;
    }
  } catch (err) {
    console.error('Gagal load tema:', err);
    applyThemeFromSheet('default', '#ffffff');
    return false;
  }
}

async function fetchDataSekolah() {
    try {
        const response = await fetch(`${APPS_SCRIPT_URL}?action=getSekolah`);
        const data = await response.json();
        if (data.success) {
            sekolahData.namaSekolah = data.namaSekolah;
            sekolahData.namaKepsek = data.namaKepsek;
        }
    } catch (err) {
        console.error('Gagal mengambil data sekolah:', err);
    }
    updateUISekolah();
}

function updateUISekolah() {
    const ns = sekolahData.namaSekolah;
    
    const welcomeEl = document.getElementById('welcomeText');
    if (welcomeEl && ns) {
        welcomeEl.innerText = ns.toUpperCase();
    }
    
    document.getElementById('pageTitle').innerText = `${ns} - Pengumuman Kelulusan`;
    
    const subtitleEl = document.getElementById('subtitleSekolah');
    if (subtitleEl) subtitleEl.innerText = `${ns}`;
}

// ================= ANIMASI WELCOME SCREEN =================
async function startWelcomeAnimation() {
    const welcomeScreen = document.getElementById('welcomeScreen');
    const welcomeText = document.getElementById('welcomeText');
    const mainContent = document.getElementById('mainContent');
    
    // Pastikan teks sudah terisi
    if (!welcomeText.innerText) {
        await new Promise(resolve => setTimeout(resolve, 100));
    }
    
    // Trigger animasi masuk (zoom in)
    welcomeText.classList.add('animate-in');
    
    // Tunggu 3 detik (lihat teks)
    await new Promise(resolve => setTimeout(resolve, 3000));
    
    // Animasi keluar untuk teks
    welcomeText.classList.add('animate-out');
    
    // Tunggu animasi teks keluar (0.9 detik)
    await new Promise(resolve => setTimeout(resolve, 900));
    
    // Animasi keluar untuk welcome screen
    welcomeScreen.classList.add('welcome-screen-fade-out');

    welcomeScreen.style.display = 'none';

    setTimeout(() => {
        mainContent.classList.add('show');

}

function speakText(text) {
    if (!('speechSynthesis' in window)) return;
    
    // Batalkan speech yang sedang berjalan
    speechSynthesis.cancel();
    
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'id-ID';
    utterance.rate = 0.9;
    utterance.pitch = 1;
    
    // Tunggu voices loaded
    const setVoice = () => {
        const voices = speechSynthesis.getVoices();
        const indoVoice = voices.find(v => v.lang === 'id-ID');
        if (indoVoice) {
            utterance.voice = indoVoice;
        }
        speechSynthesis.speak(utterance);
    };
    
    if (speechSynthesis.getVoices().length) {
        setVoice();
    } else {
        speechSynthesis.addEventListener('voiceschanged', setVoice, { once: true });
    }
}

async function searchStudentByNISN(nisn) {
    try {
        const response = await fetch(`${APPS_SCRIPT_URL}?nisn=${encodeURIComponent(nisn)}`);
        const data = await response.json();
        
        if (data.success && data.nama) {
            return data;
        } else {
            return null;
        }
    } catch (err) {
        console.error('Error fetching data:', err);
        return null;
    }
}

function formatTanggal(tanggalInput) {
    if (!tanggalInput) return '-';
    
    if (typeof tanggalInput === 'string' && tanggalInput.includes('/')) {
        return tanggalInput;
    }
    
    try {
        let dateObj = new Date(tanggalInput);
        if (!isNaN(dateObj.getTime())) {
            const day = String(dateObj.getDate()).padStart(2, '0');
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const year = dateObj.getFullYear();
            return `${day}/${month}/${year}`;
        }
    } catch(e) {
        return tanggalInput;
    }
    
    return tanggalInput;
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}
